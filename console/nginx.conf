# Консоль Оператора за nginx (Railway, #45 з.2). Раздаём собранный React-SPA и проксируем /api → ядро.
# Браузер зовёт ТОЛЬКО origin консоли (/api относительно) → CORS не нужен; авторизация — в ядре.
# Цель прокси — публичный URL ядра (TLS + Bearer): просто и надёжно, без нюансов приватного DNS nginx.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # /api/v1/... → ядро /v1/... (трейлинг-слэш в proxy_pass срезает префикс /api, как rewrite в vite-dev).
    location /api/ {
        proxy_pass https://core-production-429b.up.railway.app/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host core-production-429b.up.railway.app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA-фолбэк: клиентский роутинг react-router — неизвестные пути отдаём index.html (не 404).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
