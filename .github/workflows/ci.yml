name: CI
# Гейт §2: ruff + pytest на чистом Linux. Ядру нужен свежий Postgres (доказательство БД —
# воспроизводимо, без macOS-капризов Gatekeeper). Оркестратору БД не нужна: тесты гоняют
# FakeDriver и httpx.MockTransport (живой Railway не трогаем — это отдельная веха roadmap).
on:
  push:
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: mfc
          POSTGRES_PASSWORD: mfc
          POSTGRES_DB: mfc_core
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mfc -d mfc_core"
          --health-interval 3s --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://mfc:mfc@localhost:5432/mfc_core
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"          # цель деплоя (ADR-0003)
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: PYTHONPATH="$PWD" pytest -q

  orchestrator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"          # цель деплоя (ADR-0003)
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: PYTHONPATH="$PWD" pytest -q
