name: CI
# Гейт §2: ruff + pytest на чистом Linux. Ядру нужен свежий Postgres (доказательство БД —
# воспроизводимо, без macOS-капризов Gatekeeper). Оркестратору БД не нужна: тесты гоняют
# FakeDriver и httpx.MockTransport (живой Railway не трогаем — это отдельная веха roadmap).
on:
  push:
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: mfc
          POSTGRES_PASSWORD: mfc
          POSTGRES_DB: mfc_core
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mfc -d mfc_core"
          --health-interval 3s --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://mfc:mfc@localhost:5432/mfc_core
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"          # цель деплоя (ADR-0003)
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: PYTHONPATH="$PWD" pytest -q

  orchestrator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"          # цель деплоя (ADR-0003)
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: PYTHONPATH="$PWD" pytest -q

  paper-bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bots/paper-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"          # цель деплоя (ADR-0003)
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: PYTHONPATH="$PWD" pytest -q

  pifagor-cartridge:
    # Python-тесты адаптера: unit (client/mapper/bot) + parity (реальный вендоренный build_monitor) +
    # schema-conformance. .[dev] тянет pandas/numpy (граф state→reconcile→strategy.engine); вендор на
    # sys.path кладёт conftest (PIFAGOR_HOME → ../pifagor/vendor). Docker тут НЕ трогаем (#12) — образ ниже.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bots/pifagor-cartridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"          # цель деплоя (ADR-0003)
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check app tests
      - name: Pytest
        run: pytest -q

  cartridge-image:
    # ОБЛАЧНАЯ сборка образа картриджа (#12: Docker уходит с машины Оператора). Собираем из Dockerfile
    # (context = bots/: адаптер + вендоренный снимок Пифагора), smoke-импорт в образе, и на push —
    # пуш в ghcr, откуда Railway тянет по image-ref (RailwayDriver: source.image). PR — только сборка/smoke.
    needs: pifagor-cartridge
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/mfc-pifagor-cartridge
    steps:
      - uses: actions/checkout@v4
      - name: Build image (context=bots/)
        run: docker build -f bots/pifagor-cartridge/Dockerfile -t "$IMAGE:ci" bots
      - name: Smoke — адаптер + вендоренный build_monitor импортятся в образе
        run: |
          docker run --rm "$IMAGE:ci" python -c "import app.main, app.bot, app.reader; import app.reader as r; r._ensure_vendor_on_path(); from dashboard.viewmodel import build_monitor; print('image smoke OK')"
      - name: Login ghcr (push only)
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image (push only) — теги sha + ветка
        if: github.event_name == 'push'
        run: |
          SHA_TAG="sha-$(git rev-parse --short HEAD)"
          REF_TAG="$(echo '${{ github.ref_name }}' | tr '/' '-')"
          for t in "$SHA_TAG" "$REF_TAG"; do
            docker tag "$IMAGE:ci" "$IMAGE:$t"
            docker push "$IMAGE:$t"
          done
          echo "pushed $IMAGE:$SHA_TAG and $IMAGE:$REF_TAG"
